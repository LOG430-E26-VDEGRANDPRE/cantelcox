name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_COMPOSE_VERSION: 1.29.2

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clone subprojects
      run: |
        # Liste des sous-projets à cloner
        declare -A REPOS=(
          ["svc-catalogue"]="https://github.com/LOG430-E26-VDEGRANDPRE/svc-catalogue.git"
          ["svc-clients"]="https://github.com/LOG430-E26-VDEGRANDPRE/svc-clients.git"
          ["svc-commandes"]="https://github.com/LOG430-E26-VDEGRANDPRE/svc-commandes.git"
          ["svc-facturation"]="https://github.com/LOG430-E26-VDEGRANDPRE/svc-facturation.git"
          ["svc-orchestration"]="https://github.com/LOG430-E26-VDEGRANDPRE/svc-orchestration.git"
        )

        for service in "${!REPOS[@]}"; do
          echo "Cloning $service..."
          git clone "${REPOS[$service]}" "$service"
        done

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Install Docker Compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/${DOCKER_COMPOSE_VERSION}/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose

    - name: Build and test services
      run: |
        # Liste des services à construire
        SERVICES=("svc-catalogue" "svc-clients" "svc-commandes" "svc-facturation" "svc-orchestration")

        for service in "${SERVICES[@]}"; do
          echo "Building $service..."
          cd $service

          # Vérifier si le Dockerfile existe
          if [ -f "Dockerfile" ]; then

            # Configurer les variables d'environnement pour chaque service
            case $service in
              "svc-catalogue")
                echo "MONGODB_HOST=${{ secrets.MONGODB_HOST }}" > .env
                echo "MONGO_DB_NAME=${{ secrets.MONGO_DB_NAME }}" >> .env
                echo "DB_USERNAME=${{ secrets.MONGO_DB_USERNAME }}" >> .env
                echo "DB_PASSWORD=${{ secrets.MONGO_DB_PASSWORD }}" >> .env
                echo "DB_RESULT_MAX_LIMIT=${{ secrets.DB_RESULT_MAX_LIMIT }}" >> .env
                ;;
              "svc-clients")
                echo "DB_HOST=${{ secrets.MYSQL_DB_HOST }}" > .env
                echo "DB_PORT=${{ secrets.MYSQL_DB_PORT }}" >> .env
                echo "DB_USER=${{ secrets.MYSQL_DB_USER }}" >> .env
                echo "DB_PASSWORD=${{ secrets.MYSQL_DB_PASSWORD }}" >> .env
                echo "DB_NAME=${{ secrets.MYSQL_DB_NAME_PARTY }}" >> .env
                echo "KC_ADMIN_USER=${{ secrets.KC_ADMIN_USER }}" >> .env
                echo "KC_ADMIN_PASSWORD=${{ secrets.KC_ADMIN_PASSWORD }}" >> .env
                echo "KC_URL=${{ secrets.KC_URL }}" >> .env
                echo "KC_PUBLIC_URL=${{ secrets.KC_PUBLIC_URL }}" >> .env
                echo "KC_REALM=${{ secrets.KC_REALM }}" >> .env
                echo "KC_CLIENT_ID=${{ secrets.KC_CLIENT_ID }}" >> .env
                ;;
              "svc-commandes")
                echo "DB_HOST=${{ secrets.MYSQL_DB_HOST }}" > .env
                echo "DB_PORT=${{ secrets.MYSQL_DB_PORT }}" >> .env
                echo "DB_USER=${{ secrets.MYSQL_DB_USER }}" >> .env
                echo "DB_PASSWORD=${{ secrets.MYSQL_DB_PASSWORD }}" >> .env
                echo "DB_NAME=${{ secrets.MYSQL_DB_NAME_ORDER }}" >> .env
                echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env
                echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
                echo "REDIS_DB=${{ secrets.REDIS_DB_COMMANDES }}" >> .env
                echo "API_GATEWAY_URL=${{ secrets.API_GATEWAY_URL }}" >> .env
                ;;
              "svc-facturation")
                echo "DB_HOST=${{ secrets.MYSQL_DB_HOST }}" > .env
                echo "DB_PORT=${{ secrets.MYSQL_DB_PORT }}" >> .env
                echo "DB_USER=${{ secrets.MYSQL_DB_USER }}" >> .env
                echo "DB_PASSWORD=${{ secrets.MYSQL_DB_PASSWORD }}" >> .env
                echo "DB_NAME=${{ secrets.MYSQL_DB_NAME_CUSTOMERBILL }}" >> .env
                echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env
                echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
                echo "REDIS_DB=${{ secrets.REDIS_DB_CUSTOMERBILL }}" >> .env
                echo "API_GATEWAY_URL=${{ secrets.API_GATEWAY_URL }}" >> .env
                echo "MONGODB_HOST=${{ secrets.MONGODB_HOST }}" >> .env
                echo "MONGO_DB_NAME=${{ secrets.MONGO_DB_NAME }}" >> .env
                echo "MONGO_DB_USERNAME=${{ secrets.MONGO_DB_USERNAME }}" >> .env
                echo "MONGO_DB_PASSWORD=${{ secrets.MONGO_DB_PASSWORD }}" >> .env
                echo "MONGO_DB_RESULT_MAX_LIMIT=${{ secrets.MONGO_DB_RESULT_MAX_LIMIT_USAGE }}" >> .env
                ;;
              "svc-orchestration")
                echo "FLASK_PORT=${{ secrets.SAGA_FLASK_PORT }}" > .env
                echo "API_GATEWAY_URL=${{ secrets.API_GATEWAY_URL }}" >> .env
                echo "FACTURATION_API=${{ secrets.FACTURATION_API }}" >> .env
                echo "CLIENTS_URL=${{ secrets.CLIENTS_URL }}" >> .env
                echo "COMMANDES_URL=${{ secrets.COMMANDES_URL }}" >> .env
                echo "CATALOGUE_URL=${{ secrets.CATALOGUE_URL }}" >> .env
                echo "FACTURATION_URL=${{ secrets.FACTURATION_URL }}" >> .env
                echo "LIGNES_WEBCONSOLE=${{ secrets.LIGNES_WEBCONSOLE }}" >> .env
                echo "LIGNES_UDM=${{ secrets.LIGNES_UDM }}" >> .env
                echo "ADMIN_FREE5GC=${{ secrets.ADMIN_FREE5GC }}" >> .env
                echo "PASSWORD_FREE5GC=${{ secrets.PASSWORD_FREE5GC }}" >> .env
                echo "KC_CLIENT_ID=${{ secrets.KC_CLIENT_ID }}" >> .env
                echo "KC_REALM=${{ secrets.KC_REALM }}" >> .env
                echo "KC_CLIENT_SECRET=${{ secrets.KC_CLIENT_SECRET }}" >> .env
                echo "KC_URL=${{ secrets.KC_URL }}" >> .env
                ;;
            esac

            docker build -t vdegrandpre/$service:latest .

            # Vérifier si des tests existent
            if [ -f "requirements.txt" ]; then
              echo "Installing test dependencies for $service..."
              pip install -r requirements.txt

              # Exécuter les tests si un fichier de test existe
              if ls *test*.py 1> /dev/null 2>&1; then
                echo "Running tests for $service..."
                python -m pytest . -v
              else
                echo "No tests found for $service"
              fi
            fi
          else
            echo "No Dockerfile found for $service"
          fi

          cd ..
        done

    - name: Push Docker images
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      run: |
        # Liste des services à déployer
        SERVICES=("svc-catalogue" "svc-clients" "svc-commandes" "svc-facturation" "svc-orchestration")

        for service in "${SERVICES[@]}"; do
          if [ -d "$service" ]; then
            echo "Pushing $service image..."
            docker push vdegrandpre/$service:latest
          fi
        done

  deploy:
    name: Deploy
    needs: build-and-test
    runs-on: [self-hosted, deploy]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clone subprojects
      run: |
        # Liste des sous-projets à cloner
        declare -A REPOS=(
          ["svc-catalogue"]="https://github.com/your-org/svc-catalogue.git"
          ["svc-clients"]="https://github.com/your-org/svc-clients.git"
          ["svc-commandes"]="https://github.com/your-org/svc-commandes.git"
          ["svc-facturation"]="https://github.com/your-org/svc-facturation.git"
          ["svc-orchestration"]="https://github.com/your-org/svc-orchestration.git"
        )

        for service in "${!REPOS[@]}"; do
          echo "Cloning $service..."
          git clone "${REPOS[$service]}" "$service"
        done

    - name: Install Docker Compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/${DOCKER_COMPOSE_VERSION}/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose

    - name: Deploy with Docker Compose
      run: |
        docker-compose -f docker-compose.yml up -d

        # Attendre que les services soient prêts
        sleep 30

        # Vérifier que les services sont en cours d'exécution
        docker ps -a

    - name: Run integration tests
      run: |
        # Ajouter ici les tests d'intégration si nécessaire
        echo "Running integration tests..."
        # Exemple: curl http://localhost:8080/health
