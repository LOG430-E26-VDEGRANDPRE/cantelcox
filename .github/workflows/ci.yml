name: CI/CD Pipeline CanTelcoX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_COMPOSE_VERSION: 2.24.5

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clone subprojects
      run: |
        # Liste des sous-projets à cloner
        declare -A REPOS=(
          ["svc-catalogue"]="github.com/LOG430-E26-VDEGRANDPRE/svc-catalogue.git"
          ["svc-clients"]="github.com/LOG430-E26-VDEGRANDPRE/svc-clients.git"
          ["svc-commandes"]="github.com/LOG430-E26-VDEGRANDPRE/svc-commandes.git"
          ["svc-facturation"]="github.com/LOG430-E26-VDEGRANDPRE/svc-facturation.git"
          ["svc-orchestration"]="github.com/LOG430-E26-VDEGRANDPRE/svc-orchestration.git"
          ["svc-lignes"]="github.com/LOG430-E26-VDEGRANDPRE/svc-lignes.git"
        )

        for service in "${!REPOS[@]}"; do
          echo "Cloning $service..."
          git clone "https://x-access-token:${{ secrets.PAT }}@${REPOS[$service]}" "$service"
        done

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Install Docker Compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/v${DOCKER_COMPOSE_VERSION}/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose

    - name: Build and test services
      env:
        MONGODB_HOST: ${{ secrets.MONGODB_HOST }}
        MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
        MONGO_DB_USERNAME: ${{ secrets.MONGO_DB_USERNAME }}
        MONGO_DB_PASSWORD: ${{ secrets.MONGO_DB_PASSWORD }}
        DB_RESULT_MAX_LIMIT: ${{ secrets.DB_RESULT_MAX_LIMIT }}
        MYSQL_DB_HOST: ${{ secrets.MYSQL_DB_HOST }}
        MYSQL_DB_PORT: ${{ secrets.MYSQL_DB_PORT }}
        MYSQL_DB_USER: ${{ secrets.MYSQL_DB_USER }}
        MYSQL_DB_PASSWORD: ${{ secrets.MYSQL_DB_PASSWORD }}
        MYSQL_DB_NAME_PARTY: ${{ secrets.MYSQL_DB_NAME_PARTY }}
        KC_ADMIN_USER: ${{ secrets.KC_ADMIN_USER }}
        KC_ADMIN_PASSWORD: ${{ secrets.KC_ADMIN_PASSWORD }}
        KC_URL: ${{ secrets.KC_URL }}
        KC_PUBLIC_URL: ${{ secrets.KC_PUBLIC_URL }}
        KC_REALM: ${{ secrets.KC_REALM }}
        KC_CLIENT_ID: ${{ secrets.KC_CLIENT_ID }}
        MYSQL_DB_NAME_ORDER: ${{ secrets.MYSQL_DB_NAME_ORDER }}
        REDIS_HOST: ${{ secrets.REDIS_HOST }}
        REDIS_PORT: ${{ secrets.REDIS_PORT }}
        REDIS_DB_COMMANDES: ${{ secrets.REDIS_DB_COMMANDES }}
        API_GATEWAY_URL: ${{ secrets.API_GATEWAY_URL }}
        MYSQL_DB_NAME_CUSTOMERBILL: ${{ secrets.MYSQL_DB_NAME_CUSTOMERBILL }}
        REDIS_DB_CUSTOMERBILL: ${{ secrets.REDIS_DB_CUSTOMERBILL }}
        MONGO_DB_NAME_USAGE: ${{ secrets.MONGO_DB_NAME_USAGE }}
        MONGO_DB_RESULT_MAX_LIMIT_USAGE: ${{ secrets.MONGO_DB_RESULT_MAX_LIMIT_USAGE }}
        SAGA_FLASK_PORT: ${{ secrets.SAGA_FLASK_PORT }}
        FACTURATION_API: ${{ secrets.FACTURATION_API }}
        CLIENTS_URL: ${{ secrets.CLIENTS_URL }}
        COMMANDES_URL: ${{ secrets.COMMANDES_URL }}
        CATALOGUE_URL: ${{ secrets.CATALOGUE_URL }}
        FACTURATION_URL: ${{ secrets.FACTURATION_URL }}
        LIGNES_WEBCONSOLE: ${{ secrets.LIGNES_WEBCONSOLE }}
        LIGNES_UDM: ${{ secrets.LIGNES_UDM }}
        ADMIN_FREE5GC: ${{ secrets.ADMIN_FREE5GC }}
        PASSWORD_FREE5GC: ${{ secrets.PASSWORD_FREE5GC }}
        KC_CLIENT_SECRET: ${{ secrets.KC_CLIENT_SECRET }}
      run: |
        # Liste des services à construire
        SERVICES=("svc-catalogue" "svc-clients" "svc-commandes" "svc-facturation" "svc-orchestration" "svc-lignes")

        docker network inspect cantelcox-network >/dev/null 2>&1 || docker network create cantelcox-network

        for service in "${SERVICES[@]}"; do
          echo "Building $service..."
          cd $service

          # Vérifier si le Dockerfile existe
          if [ -f "Dockerfile" ]; then

            # Configurer les variables d'environnement pour chaque service
            case $service in
              "svc-catalogue")
                echo "MONGODB_HOST=$MONGODB_HOST" > ./$service/.env
                echo "MONGO_DB_NAME=$MONGO_DB_NAME" >> ./$service/.env
                echo "DB_USERNAME=$MONGO_DB_USERNAME" >> ./$service/.env
                echo "DB_PASSWORD=$MONGO_DB_PASSWORD" >> ./$service/.env
                echo "DB_RESULT_MAX_LIMIT=$DB_RESULT_MAX_LIMIT" >> ./$service/.env
                ;;
              "svc-clients")
                echo "DB_HOST=$MYSQL_DB_HOST" > ./$service/.env
                echo "DB_PORT=$MYSQL_DB_PORT" >> ./$service/.env
                echo "DB_USER=$MYSQL_DB_USER" >> ./$service/.env
                echo "DB_PASSWORD=$MYSQL_DB_PASSWORD" >> ./$service/.env
                echo "DB_NAME=$MYSQL_DB_NAME_PARTY" >> ./$service/.env
                echo "KC_ADMIN_USER=$KC_ADMIN_USER" >> ./$service/.env
                echo "KC_ADMIN_PASSWORD=$KC_ADMIN_PASSWORD" >> ./$service/.env
                echo "KC_URL=$KC_URL" >> ./$service/.env
                echo "KC_PUBLIC_URL=$KC_PUBLIC_URL" >> ./$service/.env
                echo "KC_REALM=$KC_REALM" >> ./$service/.env
                echo "KC_CLIENT_ID=$KC_CLIENT_ID" >> ./$service/.env
                ;;
              "svc-commandes")
                echo "DB_HOST=$MYSQL_DB_HOST" > ./$service/.env
                echo "DB_PORT=$MYSQL_DB_PORT" >> ./$service/.env
                echo "DB_USER=$MYSQL_DB_USER" >> ./$service/.env
                echo "DB_PASSWORD=$MYSQL_DB_PASSWORD" >> ./$service/.env
                echo "DB_NAME=$MYSQL_DB_NAME_ORDER" >> ./$service/.env
                echo "REDIS_HOST=$REDIS_HOST" >> ./$service/.env
                echo "REDIS_PORT=$REDIS_PORT" >> ./$service/.env
                echo "REDIS_DB=$REDIS_DB_COMMANDES" >> ./$service/.env
                echo "API_GATEWAY_URL=$API_GATEWAY_URL" >> ./$service/.env
                ;;
              "svc-facturation")
                echo "DB_HOST=$MYSQL_DB_HOST" > ./$service/.env
                echo "DB_PORT=$MYSQL_DB_PORT" >> ./$service/.env
                echo "DB_USER=$MYSQL_DB_USER" >> ./$service/.env
                echo "DB_PASSWORD=$MYSQL_DB_PASSWORD" >> ./$service/.env
                echo "DB_NAME=$MYSQL_DB_NAME_CUSTOMERBILL" >> ./$service/.env
                echo "REDIS_HOST=$REDIS_HOST" >> ./$service/.env
                echo "REDIS_PORT=$REDIS_PORT" >> ./$service/.env
                echo "REDIS_DB=$REDIS_DB_CUSTOMERBILL" >> ./$service/.env
                echo "API_GATEWAY_URL=$API_GATEWAY_URL" >> ./$service/.env
                echo "MONGODB_HOST=$MONGODB_HOST" >> ./$service/.env
                echo "MONGO_DB_NAME=$MONGO_DB_NAME_USAGE" >> ./$service/.env
                echo "MONGO_DB_USERNAME=$MONGO_DB_USERNAME" >> ./$service/.env
                echo "MONGO_DB_PASSWORD=$MONGO_DB_PASSWORD" >> ./$service/.env
                echo "MONGO_DB_RESULT_MAX_LIMIT=$MONGO_DB_RESULT_MAX_LIMIT_USAGE" >> ./$service/.env
                ;;
              "svc-orchestration")
                echo "FLASK_PORT=$SAGA_FLASK_PORT" > ./$service/.env
                echo "API_GATEWAY_URL=$API_GATEWAY_URL" >> ./$service/.env
                echo "FACTURATION_API=$FACTURATION_API" >> ./$service/.env
                echo "CLIENTS_URL=$CLIENTS_URL" >> ./$service/.env
                echo "COMMANDES_URL=$COMMANDES_URL" >> ./$service/.env
                echo "CATALOGUE_URL=$CATALOGUE_URL" >> ./$service/.env
                echo "FACTURATION_URL=$FACTURATION_URL" >> ./$service/.env
                echo "LIGNES_WEBCONSOLE=$LIGNES_WEBCONSOLE" >> ./$service/.env
                echo "LIGNES_UDM=$LIGNES_UDM" >> ./$service/.env
                echo "ADMIN_FREE5GC=$ADMIN_FREE5GC" >> ./$service/.env
                echo "PASSWORD_FREE5GC=$PASSWORD_FREE5GC" >> ./$service/.env
                echo "KC_CLIENT_ID=$KC_CLIENT_ID" >> ./$service/.env
                echo "KC_REALM=$KC_REALM" >> ./$service/.env
                echo "KC_CLIENT_SECRET=$KC_CLIENT_SECRET" >> ./$service/.env
                echo "KC_URL=$KC_URL" >> ./$service/.env
                ;;
            esac

            docker build -t vdegrandpre/$service:latest .

            # Vérifier si des tests existent
            if [ -f "requirements.txt" ]; then
              echo "Installing test dependencies for $service..."
              pip install -r requirements.txt

              # Exécuter les tests si un fichier de test existe
              if ls *test*.py 1> /dev/null 2>&1; then
                echo "Running tests for $service..."
                python -m pytest . -v
              else
                echo "No tests found for $service"
              fi
            fi
          else
            echo "No Dockerfile found for $service"
          fi

          cd ..
        done

    - name: Push Docker images
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      run: |
        # Liste des services à déployer
        SERVICES=("svc-catalogue" "svc-clients" "svc-commandes" "svc-facturation" "svc-orchestration")

        for service in "${SERVICES[@]}"; do
          if [ -d "$service" ]; then
            echo "Pushing $service image..."
            docker push vdegrandpre/$service:latest
          fi
        done

  deploy:
    name: Deploy
    needs: build-and-test
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clone subprojects
      run: |
        # Liste des sous-projets à cloner
        declare -A REPOS=(
          ["svc-catalogue"]="github.com/LOG430-E26-VDEGRANDPRE/svc-catalogue.git"
          ["svc-clients"]="github.com/LOG430-E26-VDEGRANDPRE/svc-clients.git"
          ["svc-commandes"]="github.com/LOG430-E26-VDEGRANDPRE/svc-commandes.git"
          ["svc-facturation"]="github.com/LOG430-E26-VDEGRANDPRE/svc-facturation.git"
          ["svc-orchestration"]="github.com/LOG430-E26-VDEGRANDPRE/svc-orchestration.git"
          ["svc-lignes"]="github.com/LOG430-E26-VDEGRANDPRE/svc-lignes.git"
        )

        for service in "${!REPOS[@]}"; do
          echo "Cloning $service..."
          git clone "https://x-access-token:${{ secrets.PAT }}@${REPOS[$service]}" "$service"
        done

    - name: Install Docker Compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/v${DOCKER_COMPOSE_VERSION}/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose

    - name: Deploy with Docker Compose
      run: |
        docker network inspect cantelcox-network >/dev/null 2>&1 || docker network create cantelcox-network

        docker compose down -v || true
        docker-compose -f docker-compose.yml up -d

        # Attendre que les services soient prêts
        sleep 30

        # Vérifier que les services sont en cours d'exécution
        docker ps -a

    - name: Run integration tests
      run: |
        # Ajouter ici les tests d'intégration si nécessaire
        echo "Running integration tests..."
        # Exemple: curl http://localhost:8080/health
